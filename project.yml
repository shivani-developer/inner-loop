name: JournalingCompanion
options:
  bundleIdPrefix: com.shivani
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.9.0
  RunAnywhere:
    url: https://github.com/RunanywhereAI/runanywhere-sdks
    branch: main

targets:
  JournalingCompanion:
    type: application
    platform: iOS
    sources:
      - path: JournalingCompanion
        excludes:
          - "Info.plist"
    resources:
      - JournalingCompanion/Resources
    info:
      path: JournalingCompanion/Info.plist
      properties:
        CFBundleDisplayName: InnerLoop
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Used to transcribe your voice reflection entries on-device. Audio never leaves your phone."
        NSSpeechRecognitionUsageDescription: "Voice transcription happens entirely on-device using WhisperKit."
        NSFaceIDUsageDescription: "Face ID protects your private reflection entries."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shivani.JournalingCompanion
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        OTHER_LDFLAGS: "$(inherited) -larchive"
    dependencies:
      - package: WhisperKit
      - package: RunAnywhere
        product: RunAnywhere
      - package: RunAnywhere
        product: RunAnywhereLlamaCPP

  JournalingCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - JournalingCompanionTests
    dependencies:
      - target: JournalingCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shivani.JournalingCompanionTests
        GENERATE_INFOPLIST_FILE: YES
